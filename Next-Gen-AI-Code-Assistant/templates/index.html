<!DOCTYPE html>
<html>
    <head>
        <title>code Assistant</title>
            <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body>
    <div class="container mt-5">
    <h1 class="mb-4">Code Assistant</h1>
    <form method="POST" enctype="multipart/form-data">
        <div class="mb-3">
            <label class="form-label">Enter your coding problem</label>
            <textarea name="query" class="form-control" rows="4"></textarea>
        </div>
        <input type="file" name="image" accept="image/*" class="form-control mb-3">
        <button type="submit" class="btn btn-primary">Generate & Execute</button>
    </form>

    {% if solution %}
    <div class="mt-4">
        <h5>Generated Code</h5>
        <pre class="bg-dark text-success p-3 rounded">{{ solution }}</pre>
    </div>
    {% endif %}

    {% if result %}
    <div class="mt-3">
        <h5>Output</h5>
        <pre class="bg-light p-3 rounded">{{ result }}</pre>
    </div>
    {% endif %}
    </div>
    </body>

</html>
